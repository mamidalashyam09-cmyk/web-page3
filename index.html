<!DOCTYPE html>
<html>
<head>

<title>Login Page</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

.login-box{
    background:white;
    width:300px;
    margin:100px auto;
    padding:20px;
    border-radius:10px;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    padding:10px 30px;
    background:blue;
    color:white;
    border:none;
    cursor:pointer;
}

#details{
    margin-top:20px;
    font-size:18px;
}

</style>

</head>


<body>


<div class="login-box">

<h2>Login</h2>

<input type="text" id="username" placeholder="Enter Username">

<input type="number" id="mobile" placeholder="Enter Mobile Number">

<button onclick="showDetails()">Login</button>


<div id="details"></div>


</div>



<script>

function showDetails(){

let user = document.getElementById("username").value;

let phone = document.getElementById("mobile").value;


document.getElementById("details").innerHTML =

"Login Details<br><br>" +
"Username: " + user +
"<br>Mobile Number: " + phone;


}

</script>


</body>
</html>
